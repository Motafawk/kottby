name: kottby
description: "A new Flutter project."
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  webview_flutter: ^4.13.1
  webview_flutter_android: ^4.12.0
  flutter_riverpod: ^3.3.1
  dio: ^5.9.2
  go_router: ^17.2.3
  shared_preferences: ^2.5.5
  intl: ^0.20.2
  jiffy: ^6.4.4
  share_plus: ^13.1.0
  url_launcher: ^6.3.2
  sqflite: ^2.4.2+1
  path: ^1.9.1
  path_provider: ^2.1.5
  open_filex: ^4.7.0
  awesome_notifications: ^0.11.0
  font_awesome_flutter: ^11.0.0


dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

